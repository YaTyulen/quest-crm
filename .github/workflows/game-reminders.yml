name: Daily Game Reminder

on:
  schedule:
    - cron: '0 14 * * *'  # каждый день 14:00 UTC = 21:00 по Томску (UTC+7)
  workflow_dispatch:       # ручной запуск для тестирования

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Send VK game reminders
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VK_COMMUNITY_TOKEN: ${{ secrets.VK_COMMUNITY_TOKEN }}
        run: node scripts/send-game-reminders.mjs
