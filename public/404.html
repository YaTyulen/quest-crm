<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Перенаправление...</title>
  <script>
    (function () {
      var repoBase = '/quest-crm/';
      var redirectPath = window.location.pathname + window.location.search + window.location.hash;

      sessionStorage.setItem('redirect', redirectPath);
      window.location.replace(repoBase);
    })();
  </script>
</head>
<body>
  <noscript>
    <p>Пожалуйста, включите JavaScript для работы приложения.</p>
  </noscript>
</body>
</html>
